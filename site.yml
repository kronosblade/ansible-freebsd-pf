---
- name: Configura Router FreeBSD
  hosts: bsd_router
  become: true

  roles:
    - freebsd_router

  tasks:
    - import_tasks: roles/freebsd_router/tasks/tuning.yml

- name: Configura Suricata IDS
  hosts: bsd_router
  become: true
  tags: suricata

  handlers:
    - name: restart suricata
      service:
        name: suricata
        state: restarted

  tasks:
    - import_tasks: roles/freebsd_router/tasks/suricata.yml
