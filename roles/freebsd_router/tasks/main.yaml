---
- name: Configura la chiave SSH autorizzata (exclusive = rimuove chiavi non gestite)
  ansible.posix.authorized_key:
    user: "{{ user_name }}"
    state: present
    key: "{{ lookup('file', pub_key_path) }}"
    exclusive: true

- name: Hardening SSH - Disabilita autenticazione con password
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd

- name: Hardening SSH - Disabilita accesso root
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd

- name: Hardening SSH - Disabilita X11 forwarding
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?X11Forwarding'
    line: 'X11Forwarding no'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd

- name: Hardening SSH - Imposta timeout sessione inattiva
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ClientAliveInterval'
    line: 'ClientAliveInterval 300'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd

- name: Hardening SSH - Limita tentativi di autenticazione
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?MaxAuthTries'
    line: 'MaxAuthTries 3'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd

- name: Installazione pacchetto ipdbtools per GeoBlocking
  community.general.pkgng:
    name: ipdbtools
    state: present

- name: Creazione script di aggiornamento tabella geo_countries
  ansible.builtin.template:
    src: update_geo_countries.sh.j2
    dest: /usr/local/sbin/update_geo_countries.sh
    owner: root
    group: wheel
    mode: '0755'
  notify: Update geo countries table

- name: Primo download del database IP (ipdb-update)
  ansible.builtin.command: /usr/local/bin/ipdb-update.sh
  args:
    creates: /usr/local/share/ipdb/ipdb.db # Lo esegue solo se il DB non esiste
  async: 900   # timeout 15 min: lo script scarica da 5 RIR, può essere lento
  poll: 30     # polling ogni 30s per non far sembrare il task appeso
  register: ipdb_result

- name: Ultime righe output ipdb-update (solo se ha girato)  # noqa: no-handler
  ansible.builtin.debug:
    msg: "{{ ipdb_result.stdout_lines[-20:] | default(['nessun output']) }}"
  when: ipdb_result.changed | default(false)

- name: Garantisce primo popolamento tabella geo_countries
  ansible.builtin.command: /usr/local/sbin/update_geo_countries.sh
  args:
    creates: /var/db/geo_countries.txt   # eseguito solo se il file non esiste

- name: Flush handlers per allineare la tabella prima del reload PF
  ansible.builtin.meta: flush_handlers

- name: Automazione aggiornamento GeoBlocking via Cron
  ansible.builtin.cron:
    name: "Update GeoBlocking Database"
    user: "root"
    minute: "55"
    hour: "9"
    job: "/usr/local/bin/ipdb-update.sh > /dev/null 2>&1 && /usr/local/sbin/update_geo_countries.sh"

- name: Assicura l'esecuzione al reboot via Cron
  ansible.builtin.cron:
    name: "Update GeoBlocking on Reboot"
    user: "root"
    special_time: reboot
    job: "/usr/local/bin/ipdb-update.sh > /dev/null 2>&1 && /usr/local/sbin/update_geo_countries.sh"

- name: Pulizia artefatti del vecchio nome blocked_countries
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/local/sbin/update_blocked_countries.sh
    - /var/db/blocked_countries.txt

- name: Installazione pacchetti di sistema
  community.general.pkgng:
    name: [doas, htop, nano, tree, bind-tools, ca_root_nss]
    state: present

- name: Installazione expiretable (opzionale) o pulizia via Cron
  ansible.builtin.cron:
    name: "Svuota tabella bruteforce ogni ora"
    minute: "0"
    job: "/sbin/pfctl -t bruteforce -T expire 86400" # 86400 secondi = 24h

- name: Configurazione privilegi doas
  ansible.builtin.copy:
    content: "permit persist :wheel\n"
    dest: /usr/local/etc/doas.conf
    mode: '0400'

- name: Abilitazione servizi nel rc.conf (sysrc)
  community.general.sysrc:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
  loop:
    - {key: "gateway_enable", value: "YES"}
    - {key: "pf_enable", value: "YES"}
    - {key: "pf_rules", value: "/etc/pf.conf"}
    - {key: "pflog_enable", value: "YES"}

- name: Garantisce directory anchor PF
  ansible.builtin.file:
    path: /etc/pf.anchors
    state: directory
    owner: root
    group: wheel
    mode: '0755'
  when: >-
    (gaming_host is defined and gaming_host | length > 0)
    or (wg_peers is defined and wg_peers | length > 0)

- name: Garantisce placeholder anchor gaming (gestito dalla role dedicata)
  ansible.builtin.copy:
    content: ""
    dest: "{{ item }}"
    force: false
    owner: root
    group: wheel
    mode: '0600'
  loop:
    - /etc/pf.anchors/gaming.rdr
    - /etc/pf.anchors/gaming.filter
  when: gaming_host is defined and (gaming_host | length > 0)

- name: Garantisce placeholder anchor wireguard (gestito dalla role dedicata)
  ansible.builtin.copy:
    content: ""
    dest: "{{ item }}"
    force: false
    owner: root
    group: wheel
    mode: '0600'
  loop:
    - /etc/pf.anchors/wg.nat
    - /etc/pf.anchors/wg.allow
    - /etc/pf.anchors/wg.filter
  when: wg_peers is defined and (wg_peers | length > 0)

- name: Configurazione file PF (con validazione)
  ansible.builtin.template:
    src: pf.conf.j2
    dest: /etc/pf.conf
    owner: root
    group: wheel
    mode: '0600'
    validate: /sbin/pfctl -nf %s
  notify: Reload pf

- name: Attivazione immediata del forwarding nel kernel
  ansible.posix.sysctl:
    name: net.inet.ip.forwarding
    value: '1'
    state: present

# ... (dopo il task del forwarding nel kernel)

- name: Installazione di Unbound (solitamente base su FreeBSD, ma assicuriamoci)
  community.general.pkgng:
    name: unbound
    state: present

# ... Configurazione Unbound come DNS Resolver
- name: Configurazione di Unbound
  ansible.builtin.template:
    src: unbound.conf.j2
    dest: /usr/local/etc/unbound/unbound.conf
    owner: root
    group: wheel
    mode: '0644'
    validate: /usr/local/sbin/unbound-checkconf %s
  notify: Restart unbound

- name: Abilitazione Unbound nel rc.conf
  community.general.sysrc:
    name: "unbound_enable"
    value: "YES"

- name: Assicura che Unbound sia avviato
  ansible.builtin.service:
    name: unbound
    state: started

# ... Installazione DHCP Server
- name: Installazione ISC DHCP Server
  community.general.pkgng:
    name: isc-dhcp44-server
    state: present

- name: Configurazione DHCPD
  ansible.builtin.template:
    src: dhcpd.conf.j2
    dest: /usr/local/etc/dhcpd.conf
    owner: root
    group: wheel
    mode: '0644'
  notify: Restart dhcpd

- name: Abilitazione DHCPD nel rc.conf e selezione interfaccia
  community.general.sysrc:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
  loop:
    - {key: "dhcpd_enable", value: "YES"}
    - {key: "dhcpd_ifaces", value: "{{ int_if }}"} # vtnet1

- name: Assicura che DHCPD sia avviato
  ansible.builtin.service:
    name: isc-dhcpd
    state: started

# --- Suricata IDS (opt-in) ---
- name: Importa task Suricata IDS
  ansible.builtin.import_tasks: suricata.yml
  tags: [suricata, never]

# --- Aggiornamenti di sicurezza ---
# Eseguire manualmente con: ansible-playbook -i hosts.ini site.yml -K --tags upgrade

- name: Aggiornamento pacchetti installati
  community.general.pkgng:
    name: "*"
    state: latest
  tags: [upgrade, never]

- name: Audit pacchetti per vulnerabilità note
  ansible.builtin.command: pkg audit -F
  register: pkg_audit
  changed_when: false
  failed_when: false
  tags: [upgrade, never]

- name: Mostra risultato audit
  ansible.builtin.debug:
    var: pkg_audit.stdout_lines
  when: pkg_audit.stdout_lines | length > 0
  tags: [upgrade, never]
