---
# ==============================================================================
# Suricata IDS - Modalità passiva (pcap)
# Il traffico viene copiato dall'interfaccia WAN e analizzato senza interruzione.
# ==============================================================================

- name: Installazione Suricata
  community.general.pkgng:
    name: suricata
    state: present

- name: Abilitazione Suricata nel rc.conf
  community.general.sysrc:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
  loop:
    - {key: "suricata_enable", value: "YES"}
    - {key: "suricata_interface", value: "{{ ext_if }}"}

- name: Creazione directory socket suricatasc
  file:
    path: /var/run/suricata
    state: directory
    owner: root
    group: wheel
    mode: '0755'

- name: Disabilita regole SCADA/ICS non necessarie
  copy:
    content: |
      group:modbus
      group:dnp3
    dest: /usr/local/etc/suricata/disable.conf
    owner: root
    group: wheel
    mode: '0644'

- name: Primo aggiornamento ruleset (Emerging Threats Open)
  command: suricata-update --disable-conf /usr/local/etc/suricata/disable.conf
  args:
    creates: /var/lib/suricata/rules/suricata.rules

- name: Deploy configurazione Suricata
  template:
    src: "{{ playbook_dir }}/roles/freebsd_router/templates/suricata.yaml.j2"
    dest: /usr/local/etc/suricata/suricata.yaml
    owner: root
    group: wheel
    mode: '0644'
  notify: restart suricata

- name: Automazione aggiornamento ruleset via Cron
  cron:
    name: "Suricata ruleset update"
    user: root
    hour: "3"
    minute: "30"
    job: "/usr/local/bin/suricata-update --disable-conf /usr/local/etc/suricata/disable.conf > /dev/null 2>&1 && /usr/sbin/service suricata reload"

- name: Configurazione log rotation Suricata (newsyslog)
  copy:
    content: |
      # logfilename                              [owner:group]  mode  count  size  wh>
      /var/log/suricata/eve.json                 root:wheel     640   7      10000 @T>
      /var/log/suricata/fast.log                 root:wheel     640   7      *     @T>
      /var/log/suricata/suricata.log             root:wheel     640   7      *     @T>
      /var/log/suricata/stats.log                root:wheel     640   7      *     @T>
    dest: /etc/newsyslog.conf.d/suricata.conf
    owner: root
    group: wheel
    mode: '0644'

- name: Assicura che Suricata sia avviato
  service:
    name: suricata
    state: started