---
# ==============================================================================
# WireGuard VPN Server
# Eseguire manualmente con: ansible-playbook -i hosts.ini site.yml -K --tags wireguard
# ==============================================================================

- name: Installazione WireGuard
  community.general.pkgng:
    name: wireguard-tools
    state: present
  tags: [wireguard, never]

- name: Caricamento modulo kernel WireGuard
  community.general.sysrc:
    name: "kld_list"
    value: "if_wg"
    state: value_present
  tags: [wireguard, never]

- name: Caricamento immediato modulo if_wg
  ansible.builtin.command: kldload if_wg
  register: kld_result
  changed_when: kld_result.rc == 0
  failed_when: false
  tags: [wireguard, never]

- name: Creazione directory chiavi WireGuard
  ansible.builtin.file:
    path: "{{ wg_keys_dir }}"
    state: directory
    owner: root
    group: wheel
    mode: '0700'
  tags: [wireguard, never]

# --- Generazione chiavi server ---

- name: Verifica esistenza chiave privata server
  ansible.builtin.stat:
    path: "{{ wg_keys_dir }}/server_private.key"
  register: server_key_stat
  tags: [wireguard, never]

- name: Generazione chiave privata server
  ansible.builtin.shell: wg genkey > {{ wg_keys_dir }}/server_private.key
  when: not server_key_stat.stat.exists
  tags: [wireguard, never]

- name: Permessi chiave privata server
  ansible.builtin.file:
    path: "{{ wg_keys_dir }}/server_private.key"
    owner: root
    group: wheel
    mode: '0600'
  tags: [wireguard, never]

- name: Generazione chiave pubblica server
  ansible.builtin.shell: wg pubkey < {{ wg_keys_dir }}/server_private.key > {{ wg_keys_dir }}/server_public.key
  args:
    creates: "{{ wg_keys_dir }}/server_public.key"
  tags: [wireguard, never]

- name: Lettura chiave privata server
  ansible.builtin.command: cat {{ wg_keys_dir }}/server_private.key
  register: wg_server_privkey
  changed_when: false
  tags: [wireguard, never]

- name: Lettura chiave pubblica server
  ansible.builtin.command: cat {{ wg_keys_dir }}/server_public.key
  register: wg_server_pubkey
  changed_when: false
  tags: [wireguard, never]

# --- Generazione chiavi client ---

- name: Generazione chiave privata per ogni client
  ansible.builtin.shell: wg genkey > {{ wg_keys_dir }}/{{ item.name }}_private.key
  args:
    creates: "{{ wg_keys_dir }}/{{ item.name }}_private.key"
  loop: "{{ wg_clients }}"
  tags: [wireguard, never]

- name: Permessi chiavi private client
  ansible.builtin.file:
    path: "{{ wg_keys_dir }}/{{ item.name }}_private.key"
    owner: root
    group: wheel
    mode: '0600'
  loop: "{{ wg_clients }}"
  tags: [wireguard, never]

- name: Generazione chiave pubblica per ogni client
  ansible.builtin.shell: wg pubkey < {{ wg_keys_dir }}/{{ item.name }}_private.key > {{ wg_keys_dir }}/{{ item.name }}_public.key
  args:
    creates: "{{ wg_keys_dir }}/{{ item.name }}_public.key"
  loop: "{{ wg_clients }}"
  tags: [wireguard, never]

- name: Lettura chiavi pubbliche client
  ansible.builtin.command: cat {{ wg_keys_dir }}/{{ item.name }}_public.key
  register: wg_client_pubkeys_raw
  changed_when: false
  loop: "{{ wg_clients }}"
  tags: [wireguard, never]

- name: Costruzione mappa chiavi pubbliche client
  ansible.builtin.set_fact:
    wg_client_pubkeys: "{{ wg_client_pubkeys | default({}) | combine({item.item.name: item.stdout}) }}"
  loop: "{{ wg_client_pubkeys_raw.results }}"
  tags: [wireguard, never]

- name: Lettura chiavi private client (per generare config)
  ansible.builtin.command: cat {{ wg_keys_dir }}/{{ item.name }}_private.key
  register: wg_client_privkeys_raw
  changed_when: false
  loop: "{{ wg_clients }}"
  tags: [wireguard, never]

# --- Deploy configurazione server ---

- name: Deploy configurazione WireGuard server
  ansible.builtin.template:
    src: "{{ playbook_dir }}/roles/freebsd_router/templates/wg0.conf.j2"
    dest: "/usr/local/etc/wireguard/{{ wg_if }}.conf"
    owner: root
    group: wheel
    mode: '0600'
  notify: Restart wireguard
  tags: [wireguard, never]

# --- Configurazione rete ---

- name: Abilitazione interfaccia WireGuard nel rc.conf
  community.general.sysrc:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
  loop:
    - {key: "wireguard_enable", value: "YES"}
    - {key: "wireguard_interfaces", value: "{{ wg_if }}"}
  tags: [wireguard, never]

- name: Configurazione IP sull'interfaccia WireGuard
  community.general.sysrc:
    name: "ifconfig_{{ wg_if }}"
    value: "inet {{ wg_server_ip }}"
  tags: [wireguard, never]

- name: Creazione interfaccia cloned_interfaces per wg0
  community.general.sysrc:
    name: "cloned_interfaces"
    value: "{{ wg_if }}"
    state: value_present
  tags: [wireguard, never]

# --- Avvio servizio ---

- name: Creazione e configurazione interfaccia wg0
  ansible.builtin.shell: |
    ifconfig {{ wg_if }} destroy 2>/dev/null || true
    ifconfig {{ wg_if }} create
    ifconfig {{ wg_if }} inet {{ wg_server_ip }}
    wg setconf {{ wg_if }} /usr/local/etc/wireguard/{{ wg_if }}.conf
    ifconfig {{ wg_if }} up
  changed_when: true
  tags: [wireguard, never]

# --- Stampa configurazioni client ---

- name: Configurazioni client da distribuire
  ansible.builtin.debug:
    msg: |
      === Configurazione {{ item.0.name }} ===
      [Interface]
      PrivateKey = {{ item.1.stdout }}
      Address = {{ item.0.ip | regex_replace('/32', '/28') }}
      DNS = 10.0.0.1

      [Peer]
      PublicKey = {{ wg_server_pubkey.stdout }}
      Endpoint = {{ wg_endpoint }}:{{ wg_port }}
      AllowedIPs = {{ wg_allowed_networks | join(', ') }}
      PersistentKeepalive = 25
  loop: "{{ wg_clients | zip(wg_client_privkeys_raw.results) | list }}"
  tags: [wireguard, never]
