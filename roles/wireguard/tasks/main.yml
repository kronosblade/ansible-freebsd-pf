---
- name: Installazione wireguard-tools
  community.general.pkgng:
    name: wireguard-tools
    state: present

- name: Verifica se il kernel module if_wg è già caricato
  ansible.builtin.command: /sbin/kldstat -q -m if_wg
  register: wg_kldstat
  changed_when: false
  failed_when: false

- name: Caricamento kernel module if_wg
  ansible.builtin.command: /sbin/kldload if_wg
  when: wg_kldstat.rc != 0

- name: Caricamento persistente di if_wg al boot
  community.general.sysrc:
    name: kld_list
    value: if_wg
    state: value_present

- name: Garantisce directory configurazione WireGuard
  ansible.builtin.file:
    path: /usr/local/etc/wireguard
    state: directory
    owner: root
    group: wheel
    mode: '0700'

- name: Generazione chiave privata server (idempotente)
  ansible.builtin.shell:
    cmd: |
      set -eu
      umask 077
      /usr/local/bin/wg genkey > /usr/local/etc/wireguard/server.key
    creates: /usr/local/etc/wireguard/server.key

- name: Calcolo chiave pubblica server (idempotente)
  ansible.builtin.shell:
    cmd: /usr/local/bin/wg pubkey < /usr/local/etc/wireguard/server.key > /usr/local/etc/wireguard/server.pub
    creates: /usr/local/etc/wireguard/server.pub

- name: Permessi restrittivi sulla chiave privata
  ansible.builtin.file:
    path: /usr/local/etc/wireguard/server.key
    owner: root
    group: wheel
    mode: '0600'

- name: Lettura chiave privata server in memoria
  ansible.builtin.slurp:
    src: /usr/local/etc/wireguard/server.key
  register: wg_server_priv_raw
  no_log: true

- name: Lettura chiave pubblica server in memoria
  ansible.builtin.slurp:
    src: /usr/local/etc/wireguard/server.pub
  register: wg_server_pub_raw

- name: Set fact con la chiave privata decodificata
  ansible.builtin.set_fact:
    wg_server_priv: "{{ wg_server_priv_raw.content | b64decode }}"
  no_log: true

- name: Mostra chiave pubblica server (per configurare i client)
  ansible.builtin.debug:
    msg: "Chiave pubblica server (da inserire nei client come PublicKey): {{ wg_server_pub_raw.content | b64decode | trim }}"

- name: Configurazione interfaccia wg0
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /usr/local/etc/wireguard/wg0.conf
    owner: root
    group: wheel
    mode: '0600'
  no_log: true
  notify: Restart wireguard

- name: Deploy anchor PF wg.nat (sezione translation)
  ansible.builtin.template:
    src: wg.nat.j2
    dest: /etc/pf.anchors/wg.nat
    owner: root
    group: wheel
    mode: '0600'
  notify: Reload pf

- name: Deploy anchor PF wg.allow (pass tunnel UDP, pre-geoblock)
  ansible.builtin.template:
    src: wg.allow.j2
    dest: /etc/pf.anchors/wg.allow
    owner: root
    group: wheel
    mode: '0600'
  notify: Reload pf

- name: Deploy anchor PF wg.filter (traffico decapsulato)
  ansible.builtin.template:
    src: wg.filter.j2
    dest: /etc/pf.anchors/wg.filter
    owner: root
    group: wheel
    mode: '0600'
  notify: Reload pf

- name: Abilitazione servizio WireGuard nel rc.conf
  community.general.sysrc:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
  loop:
    - {key: "wireguard_enable", value: "YES"}
    - {key: "wireguard_interfaces", value: "wg0"}

- name: Avvio del servizio WireGuard
  ansible.builtin.service:
    name: wireguard
    state: started
    enabled: true
  notify: Restart unbound
